<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет — WaterProject</title>
    <!-- Подключение FontAwesome для иконок -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://unpkg.com"></script>
    <style>
        :root { --primary-color: #4fc3f7; --accent-color: #2ecc71; --dark-bg: rgba(15, 15, 15, 0.95); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://alphacoders.com') no-repeat center center fixed; background-size: cover; color: #fff; }
        nav { background: #0a0a0a; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        nav .brand { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); text-decoration: none; }
        nav .menu-links a { color: #bbb; text-decoration: none; margin-left: 25px; font-weight: 500; }
        nav .menu-links a:hover, nav .menu-links a.active { color: var(--primary-color); }
        .main-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid-panel { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 900px) { .grid-panel { grid-template-columns: 1fr; } }
        .card { background: var(--dark-bg); border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 6px; background: #050505; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-green { background: var(--accent-color); color: #fff; } .btn-blue { background: var(--primary-color); color: #000; }
        .btn-google { background: #fff; color: #000; margin-top: 15px; }
        .skin-preview { background: #050505; border: 2px dashed #333; height: 300px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .skin-image { height: 90%; image-rendering: pixelated; }
        .balance-badge { background: #f39c12; color: #000; padding: 6px 18px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .hidden { display: none; } .status-msg { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand">🌊 WATERPROJECT</a>
        <div class="menu-links">
            <a href="index.html"><i class="fa-solid fa-house"></i> Главная</a>
            <a href="news.html"><i class="fa-solid fa-newspaper"></i> Новости</a>
            <a href="media.html"><i class="fa-solid fa-photo-film"></i> Медиа</a>
            <a href="lk.html" class="active"><i class="fa-solid fa-circle-user"></i> Личный кабинет</a>
        </div>
    </nav>
    <div class="main-container">
        <!-- Вход/Регистрация -->
        <div id="authBlock" class="card" style="max-width: 400px; margin: 0 auto;">
            <h3 style="color: var(--primary-color); margin-top:0;">Вход в аккаунт</h3>
            <form onsubmit="return false;">
                <input type="email" id="email" class="input-field" placeholder="Ваш Email" required>
                <input type="password" id="password" class="input-field" placeholder="Пароль" required>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="button" id="loginBtn" class="btn btn-blue">Войти</button>
                    <button type="button" id="regBtn" class="btn btn-green">Регистрация</button>
                </div>
            </form>
            <button type="button" id="googleBtn" class="btn btn-google">
                <img src="https://gstatic.com" alt="Google" width="18"> Войти через Google
            </button>
            <div id="authMessage" class="status-msg"></div>
        </div>

        <!-- Управление профилем -->
        <div id="lkBlock" class="grid-panel hidden">
            <div class="card" style="text-align: center;">
                <h3 style="color: var(--primary-color); margin-top:0;">Профиль</h3>
                <div class="balance-badge"><i class="fa-solid fa-coins"></i> Баланс: <span id="userBalance">0</span> монет</div>
                <div class="skin-preview"><img id="skinImg" class="skin-image" src="https://minotar.net" alt="Skin"></div>
                <p id="lkUsername" style="font-size: 1.3rem; font-weight: bold; margin: 0; color: var(--primary-color);"></p>
                <button type="button" id="logoutBtn" class="btn btn-blue" style="margin-top: 20px; background: #e74c3c; color: white;">Выйти</button>
            </div>
            <div class="card">
                <h3 style="color: var(--primary-color); margin-top:0;">Настройки персонажа</h3>
                <div style="margin-bottom: 25px;">
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;"><i class="fa-solid fa-shirt"></i> Установить скин (.PNG)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="file" id="skinFile" accept=".png" class="input-field" style="margin:0; padding: 8px;">
                        <button type="button" id="uploadSkinBtn" class="btn btn-blue" style="width: auto; padding: 0 20px;">Загрузить</button>
                    </div>
                </div>
                <div>
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;"><i class="fa-solid fa-ticket"></i> Активировать промокод</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="promoInput" class="input-field" placeholder="Введите промокод" style="margin: 0;">
                        <button type="button" id="activatePromoBtn" class="btn btn-green" style="width: auto; padding: 0 25px;">ОК</button>
                    </div>
                </div>
                <div id="lkMessage" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://hqedflvozrymweaueymk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_AhbI07QUWbsjEy-16VJ4zw_ymUbQ7sL";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let sessionUser = null;

        // Функция проверки почты и переключения экранов
        async function checkVerificationAndOpen(user) {
            const msg = document.getElementById('authMessage');
            
            // Если у пользователя нет метки времени подтверждения почты
            if (!user.email_confirmed_at) {
                msg.innerText = "Пожалуйста, подтвердите ваш Email на почте перед входом!";
                msg.style.color = "#f39c12";
                
                // Выходим из сессии, чтобы неавторизованный статус сохранялся
                await supabaseClient.auth.signOut();
                return;
            }

            // Если всё подтверждено — пускаем в ЛК
            sessionUser = user;
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('lkBlock').classList.remove('hidden');
            document.getElementById('lkUsername').innerText = user.email;
            msg.innerText = "";
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.user) { 
                await checkVerificationAndOpen(session.user); 
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            
            if(!email || !password) return;
            msg.innerText = "Вход...";
            msg.style.color = "#fff";

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) { 
                msg.innerText = "Ошибка: " + error.message; 
                msg.style.color = "#e74c3c"; 
            } else if (data.user) { 
                await checkVerificationAndOpen(data.user); 
            }
        });

        document.getElementById('regBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            
            if(!email || !password) return;
            msg.innerText = "Регистрация...";
            msg.style.color = "#fff";

            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            
            if (error) { 
                msg.innerText = "Ошибка: " + error.message; 
                msg.style.color = "#e74c3c"; 
            } else { 
                msg.innerText = "Успех! Письмо отправлено. Проверьте почту для активации."; 
                msg.style.color = "#2ecc71"; 
            }
        });
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            sessionUser = null;
            document.getElementById('lkBlock').classList.add('hidden');
document.getElementById('authBlock').classList.remove('hidden');document.getElementById('email').value = "";document.getElementById('password').value = "";});
