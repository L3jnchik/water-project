<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет — WaterProject</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Чистый скрипт Supabase SDK -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --primary-color: #4fc3f7; --accent-color: #2ecc71; --dark-bg: rgba(15, 15, 15, 0.95); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://alphacoders.com') no-repeat center center fixed; background-size: cover; color: #fff; }
        nav { background: #0a0a0a; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        nav .brand { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); text-decoration: none; }
        nav .menu-links a { color: #bbb; text-decoration: none; margin-left: 25px; font-weight: 500; }
        nav .menu-links a:hover, nav .menu-links a.active { color: var(--primary-color); }
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid-panel { display: grid; grid-template-columns: 1.2fr 2fr; gap: 30px; }
        @media (max-width: 900px) { .grid-panel { grid-template-columns: 1fr; } }
        .card { background: var(--dark-bg); border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .card h3 { margin-top: 0; color: var(--primary-color); border-bottom: 1px solid #222; padding-bottom: 10px; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 6px; background: #050505; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-green { background: var(--accent-color); color: #fff; } .btn-green:hover { background: #27ae60; }
        .btn-blue { background: var(--primary-color); color: #000; } .btn-blue:hover { background: #29b6f6; }
        .btn-orange { background: #e67e22; color: #fff; } .btn-orange:hover { background: #d35400; }
        .profile-header { display: flex; align-items: center; gap: 20px; background: #0a0a0a; padding: 20px; border-radius: 10px; border: 1px solid #222; margin-bottom: 20px; }
        .skin-preview { background: #050505; border: 2px dashed #333; height: 180px; width: 130px; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .skin-image { height: 95%; image-rendering: pixelated; }
        .profile-info { flex-grow: 1; text-align: left; }
        .profile-info h2 { margin: 0 0 10px 0; color: var(--primary-color); font-size: 1.6rem; }
        .balance-badge { background: #f39c12; color: #000; padding: 8px 16px; border-radius: 6px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        .status-msg { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand">🌊 WATERPROJECT</a>
        <div class="menu-links">
            <a href="index.html"><i class="fa-solid fa-house"></i> Главная</a>
            <a href="news.html"><i class="fa-solid fa-newspaper"></i> Новости</a>
            <a href="media.html"><i class="fa-solid fa-photo-film"></i> Медиа</a>
            <a href="lk.html" class="active"><i class="fa-solid fa-circle-user"></i> Личный кабинет</a>
        </div>
    </nav>
    <div class="main-container">
        <!-- ФОРМА РЕГИСТРАЦИИ И ВХОДА (ПОЧТА, НИК, ПАРОЛЬ) -->
        <div id="authBlock" class="card" style="max-width: 400px; margin: 40px auto; display: block;">
            <h3>Личный Кабинет проекта</h3>
            <p style="color: #888; font-size: 0.9rem;">Вход или регистрация с подтверждением по Email.</p>
            <form onsubmit="return false;">
                <input type="text" id="username" class="input-field" placeholder="Придумайте игровой никнейм" maxlength="16">
                <input type="email" id="email" class="input-field" placeholder="Ваш реальный Email адрес" required>
                <input type="password" id="password" class="input-field" placeholder="Придумайте пароль" required>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="button" id="loginBtn" class="btn btn-blue">Войти</button>
                    <button type="button" id="regBtn" class="btn btn-green">Регистрация</button>
                </div>
            </form>
            <div id="authMessage" class="status-msg"></div>
        </div>

        <!-- ЛИЧНЫЙ КАБИНЕТ -->
        <div id="lkBlock" style="display: none;">
            <div class="profile-header">
                <div class="skin-preview"><img id="skinImg" class="skin-image" src="https://minotar.net" alt="Skin"></div>
                <div class="profile-info">
                    <p style="color: #666; font-size: 0.9rem; margin: 0 0 5px 0; text-transform: uppercase; font-weight: bold;">Игровой профиль</p>
                    <h2 id="lkUsername">Загрузка...</h2>
                    <div class="balance-badge"><i class="fa-solid fa-coins"></i> Баланс: <span id="userBalance">0</span> монет</div>
                    <div style="margin-top: 15px;"><button type="button" id="logoutBtn" class="btn btn-blue" style="width: auto; padding: 6px 15px; background: #e74c3c; color: #fff;"><i class="fa-solid fa-right-from-bracket"></i> Выйти</button></div>
                </div>
            </div>
            
            <div class="grid-panel">
                <div class="card">
                    <h3>Кастомизация скина</h3>
                    <button type="button" id="generateSkinBtn" class="btn btn-orange"><i class="fa-solid fa-shuffle"></i> Сгенерировать случайный скин</button>
                </div>
                <div class="card">
                    <h3>Активация бонусов</h3>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="text" id="promoInput" class="input-field" placeholder="Введите промокод" style="margin: 0;">
                        <button type="button" id="activatePromoBtn" class="btn btn-green" style="width: auto; padding: 0 25px;">ОК</button>
                    </div>
                    <div id="lkMessage" class="status-msg"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZWRmbHZvenJ5bXdlYXVлеW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzEzMDIsImV4cCI6MjA5NjQwNzMwMn0.kMKJKd_BdtmCLJGYbk8VKUD2WxYwBQRgyGl_ZOvBm6M";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        const randomSkinNames = ["FixEye", "Comp", "Scally", "Ronaldo", "MrBeast", "Dream", "Technoblade", "Frostdog", "Coffi", "EdisonPTS"];

        // Автоматическая проверка сессии при входе на сайт
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                await loadPlayerProfile(session.user.id);
            }
        });

        // 1. РЕГИСТРАЦИЯ С ОФИЦИАЛЬНЫМ ПОДТВЕРЖДЕНИЕМ ПО ПОЧТЕ (КАК У GRIBLAND)
        document.getElementById('regBtn').addEventListener('click', async () => {
            const nick = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');

            if (nick.length < 3 || !email || !password) {
                msg.innerText = "Заполните ник, почту и пароль!"; msg.style.color = "#e74c3c";
                return;
            }

            msg.innerText = "Отправка запроса..."; msg.style.color = "#fff";

            // Проверяем, не занят ли игровой никнейм в таблице users
            let { data: exist } = await supabaseClient.from('users').select('username').eq('username', nick).maybeSingle();
            if (exist) {
                msg.innerText = "Этот никнейм уже занят!"; msg.style.color = "#e74c3c";
                return;
            }

            // Запускаем встроенную регистрацию Supabase Auth с отправкой письма подтверждения
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    // Передаем игровой ник в метаданные аккаунта
                    data: { display_name: nick }
                }
            });

            if (error) {
                msg.innerText = "Ошибка: " + error.message; msg.style.color = "#e74c3c";
            } else {
                msg.innerText = "Успех! На вашу почту отправлено письмо. Подтвердите вход по ссылке и войдите на сайт!";
                msg.style.color = "#2ecc71";
            }
        });

        // 2. ВХОД В ЛИЧНЫЙ КАБИНЕТ (ПУСТИТ ТОЛЬКО ЕСЛИ ПОЧТА ПОДТВЕРЖДЕНА)
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            if (!email || !password) return;

            msg.innerText = "Вход..."; msg.style.color = "#fff";

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                msg.innerText = "Ошибка: " + error.message; msg.style.color = "#e74c3c";
            } else {
                await loadPlayerProfile(data.user.id);
            }
        });

        // ЗАГРУЗКА И СИНХРОНИЗАЦИЯ ПРОФИЛЯ
        async function loadPlayerProfile(userId) {
            // Ищем игрока в нашей публичной таблице users
            let { data: profile } = await supabaseClient.from('users').select('*').eq('id', userId).maybeSingle();

            // Если почту подтвердили впервые, строки в users еще нет — создаем её автоматически
            if (!profile) {
                const { data: { user } } = await supabaseClient.auth.getUser();
                let metaNick = user.user_metadata.display_name || user.email.split('@')[0];

                const { data: newProfile } = await supabaseClient.from('users').insert([
                    { id: userId, username: metaNick, password_hash: 'email_verified_secured' }
                ]).select().single();
                profile = newProfile;
            }

            currentUser = profile;
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('lkBlock').style.display = 'block';
            document.getElementById('lkUsername').innerText = currentUser.username;
            document.getElementById('userBalance').innerText = currentUser.balance || 0;
            if (currentUser.skin_url) document.getElementById('skinImg').src = currentUser.skin_url;
        }

        // КНОПКА ГЕНЕРАЦИИ СКИНА
        document.getElementById('generateSkinBtn').addEventListener('click', async () => {
            const randomNick = randomSkinNames[Math.floor(Math.random() * randomSkinNames.length)];
            const generatedSkinUrl = "https://minotar.net" + randomNick + "/100.png";
            
            await supabaseClient.from('users').update({ skin_url: generatedSkinUrl }).eq('id', currentUser.id);
            document.getElementById('skinImg').src = generatedSkinUrl;
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        });
    </script>
</body>
</html>
