<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — WaterProject</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #111; color: #fff; text-align: center; }
        .main-container { max-width: 350px; margin: 100px auto; padding: 25px; background: #1a1a1a; border: 2px solid #4fc3f7; border-radius: 12px; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 6px; background: #000; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; background: #2ecc71; color: #fff; }
        .status-msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <h3>Регистрация WaterProject</h3>
        <p style="color: #888; font-size: 0.9rem;">Придумайте игровой никнейм и пароль.</p>
        <input type="text" id="username" class="input-field" placeholder="Ваш никнейм Minecraft" maxlength="16">
        <input type="password" id="password" class="input-field" placeholder="Создайте пароль">
        <button type="button" id="regBtn" class="btn">Зарегистрироваться</button>
        <div id="authMessage" class="status-msg"></div>
    </div>
    <script>
        const REST_URL = "https://supabase.co";
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZWRmbHZvenJ5bXdlYXVleW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzEzMDIsImV4cCI6MjA5NjQwNzMwMn0.kMKJKd_BdtmCLJGYbk8VKUD2WxYwBQRgyGl_ZOvBm6M";

        document.getElementById('regBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            
            if (user.length < 3 || !pass) {
                msg.innerText = "Заполните все поля!";
                msg.style.color = "#e74c3c";
                return;
            }

            msg.innerText = "Отправка...";
            msg.style.color = "#fff";

            try {
                const response = await fetch(REST_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': 'Bearer ' + API_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ username: user, password_hash: pass })
                });

                if (response.status === 201) {
                    msg.innerText = "Успешно! Теперь открывайте лаунчер.";
                    msg.style.color = "#2ecc71";
                    document.getElementById('username').value = "";
                    document.getElementById('password').value = "";
                } else {
                    msg.innerText = "Этот никнейм уже занят!";
                    msg.style.color = "#e74c3c";
                }
            } catch (e) {
                msg.innerText = "Сбой сети.";
                msg.style.color = "#e74c3c";
            }
        });
    </script>
</body>
</html>
