<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет — WaterProject</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --primary-color: #4fc3f7; --accent-color: #2ecc71; --dark-bg: rgba(15, 15, 15, 0.95); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://alphacoders.com') no-repeat center center fixed; background-size: cover; color: #fff; }
        nav { background: #0a0a0a; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        nav .brand { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); text-decoration: none; }
        .main-container { max-width: 400px; margin: 80px auto; padding: 0 20px; }
        .card { background: var(--dark-bg); border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 6px; background: #050505; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; transition: 0.2s; }
        .btn-green { background: var(--accent-color); color: #fff; } .btn-green:hover { background: #27ae60; }
        .status-msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="brand">🌊 WATERPROJECT</a>
    </nav>

    <div class="main-container">
        <div id="authBlock" class="card">
            <h3>Регистрация на сервере</h3>
            <p style="color: #888; font-size: 0.9rem;">Придумайте никнейм и пароль для игры.</p>
            <form onsubmit="return false;">
                <input type="text" id="username" class="input-field" placeholder="Ваш никнейм Minecraft" maxlength="16">
                <input type="password" id="password" class="input-field" placeholder="Создайте пароль">
                <button type="button" id="regBtn" class="btn btn-green">Зарегистрироваться</button>
            </form>
            <div id="authMessage" class="status-msg"></div>
        </div>
    </div>
    <script>
        const SUPABASE_REST_URL = "https://supabase.co";
        const SUPABASE_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZWRmbHZvenJ5bXdlYXVleW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzEzMDIsImV4cCI6MjA5NjQwNzMwMn0.kMKJKd_BdtmCLJGYbk8VKUD2WxYwBQRgyGl_ZOvBm6M";

        document.getElementById('regBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            
            if (user.length < 3 || !pass) {
                msg.innerText = "Ник должен быть от 3 символов!";
                msg.style.color = "#e74c3c";
                return;
            }

            msg.innerText = "Отправка...";
            msg.style.color = "#fff";

            try {
                // Прямой сетевой шлюз, который разрешен всеми браузерами в РФ
                const response = await fetch(SUPABASE_REST_URL, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_API_KEY,
                        'Authorization': 'Bearer ' + SUPABASE_API_KEY,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ username: user, password_hash: pass })
                });

                if (response.status === 201) {
                    msg.innerText = "Успешно! Теперь открывайте лаунчер.";
                    msg.style.color = "#2ecc71";
                    document.getElementById('username').value = "";
                    document.getElementById('password').value = "";
                } else {
                    const errData = await response.json().catch(() => ({}));
                    if (response.status === 409 || errData.code === "23505") {
                        msg.innerText = "Этот никнейм уже занят!";
                    } else {
                        msg.innerText = "Ошибка базы: " + (errData.message || response.statusText);
                    }
                    msg.style.color = "#e74c3c";
                }
            } catch (e) {
                msg.innerText = "Ошибка сети при связи с базой данных.";
                msg.style.color = "#e74c3c";
                console.error(e);
            }
        });
    </script>
</body>
</html>
