<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет — WaterProject</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://unpkg.com"></script>
    <style>
        :root { --primary-color: #4fc3f7; --accent-color: #2ecc71; --dark-bg: rgba(15, 15, 15, 0.95); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://alphacoders.com') no-repeat center center fixed; background-size: cover; color: #fff; }
        nav { background: #0a0a0a; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; }
        nav .brand { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); text-decoration: none; }
        nav .menu-links a { color: #bbb; text-decoration: none; margin-left: 25px; font-weight: 500; }
        nav .menu-links a:hover, nav .menu-links a.active { color: var(--primary-color); }
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid-panel { display: grid; grid-template-columns: 1.2fr 2fr; gap: 30px; }
        @media (max-width: 900px) { .grid-panel { grid-template-columns: 1fr; } }
        .card { background: var(--dark-bg); border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .card h3 { margin-top: 0; color: var(--primary-color); border-bottom: 1px solid #222; padding-bottom: 10px; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 6px; background: #050505; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-green { background: var(--accent-color); color: #fff; } .btn-green:hover { background: #27ae60; }
        .btn-blue { background: var(--primary-color); color: #000; } .btn-blue:hover { background: #29b6f6; }
        .profile-header { display: flex; align-items: center; gap: 20px; background: #0a0a0a; padding: 20px; border-radius: 10px; border: 1px solid #222; margin-bottom: 20px; }
        .skin-preview { background: #050505; border: 2px dashed #333; height: 180px; width: 130px; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .skin-image { height: 95%; image-rendering: pixelated; }
        .profile-info { flex-grow: 1; text-align: left; }
        .profile-info h2 { margin: 0 0 10px 0; color: var(--primary-color); font-size: 1.6rem; }
        .balance-badge { background: #f39c12; color: #000; padding: 8px 16px; border-radius: 6px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        .status-msg { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="brand">🌊 WATERPROJECT</a>
        <div class="menu-links">
            <a href="index.html"><i class="fa-solid fa-house"></i> Главная</a>
            <a href="news.html"><i class="fa-solid fa-newspaper"></i> Новости</a>
            <a href="media.html"><i class="fa-solid fa-photo-film"></i> Медиа</a>
            <a href="lk.html" class="active"><i class="fa-solid fa-circle-user"></i> Личный кабинет</a>
        </div>
    </nav>
    <div class="main-container">
        <!-- ЕДИНАЯ ФОРМА ВХОДА И РЕГИСТРАЦИИ -->
        <div id="authBlock" class="card" style="max-width: 400px; margin: 40px auto; display: block;">
            <h3>Вход / Быстрая Регистрация</h3>
            <p style="color: #888; font-size: 0.9rem;">Введите данные. Никнейм придумывается сразу при регистрации!</p>
            <form onsubmit="return false;">
                <input type="text" id="regNick" class="input-field" placeholder="Игровой Никнейм (3-16 симв.)">
                <input type="email" id="email" class="input-field" placeholder="Ваш Email адрес" required>
                <input type="password" id="password" class="input-field" placeholder="Пароль" required>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="button" id="loginBtn" class="btn btn-blue">Войти</button>
                    <button type="button" id="regBtn" class="btn btn-green">Зарегистрироваться</button>
                </div>
            </form>
            <div id="authMessage" class="status-msg"></div>
        </div>

        <!-- ЛИЧНЫЙ КАБИНЕТ -->
        <div id="lkBlock" style="display: none;">
            <div class="profile-header">
                <div class="skin-preview"><img id="skinImg" class="skin-image" src="https://minotar.net" alt="Skin"></div>
                <div class="profile-info">
                    <p style="color: #666; font-size: 0.9rem; margin: 0 0 5px 0; text-transform: uppercase; font-weight: bold;">Игровой профиль</p>
                    <h2 id="lkUsername">Загрузка...</h2>
                    <div class="balance-badge"><i class="fa-solid fa-coins"></i> Баланс: <span id="userBalance">0</span> монет</div>
                    <div style="margin-top: 15px;"><button type="button" id="logoutBtn" class="btn btn-blue" style="width: auto; padding: 6px 15px; background: #e74c3c; color: #fff;"><i class="fa-solid fa-right-from-bracket"></i> Выйти</button></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqZWRmbHZvenJ5bXdlYXVлеW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MzEzMDIsImV4cCI6MjA5NjQwNzMwMn0.kMKJKd_BdtmCLJGYbk8VKUD2WxYwBQRgyGl_ZOvBm6M";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let sessionUser = null;

        // РЕГИСТРАЦИЯ ЧЕРЕЗ СЕРВЕРНУЮ ФУНКЦИЮ RPC (ОБХОД CORS БЕСПЛАТНО)
        document.getElementById('regBtn').addEventListener('click', async () => {
            const nick = document.getElementById('regNick').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            
            if(nick.length < 3 || !email || !password) { msg.innerText = "Заполните все поля и ник!"; msg.style.color = "#e74c3c"; return; }
            msg.innerText = "Создание аккаунта..."; msg.style.color = "#fff";

            // Вызываем созданную нами функцию register_new_player напрямую в Supabase
            const { data, error } = await supabaseClient.rpc('register_new_player', {
                player_email: email,
                player_password: password,
                player_nick: nick
            });

            if (error || data !== 'Success') {
                msg.innerText = "Ошибка: " + (error ? error.message : data);
                msg.style.color = "#e74c3c";
            } else {
                msg.innerText = "Вы успешно зарегистрированы! Теперь нажмите кнопку 'Войти'.";
                msg.style.color = "#2ecc71";
            }
        });

        // ВХОД В ЛИЧНЫЙ КАБИНЕТ
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            if(!email || !password) return;

            msg.innerText = "Авторизация..."; msg.style.color = "#fff";

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                msg.innerText = "Неверная почта или пароль!"; msg.style.color = "#e74c3c";
            } else {
                sessionUser = data.user;
                // Загружаем профиль из таблицы users
                let { data: profile } = await supabaseClient.from('users').select('*').eq('id', sessionUser.id).single();
                showDashboard(profile);
            }
        });

        function showDashboard(profile) {
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('lkBlock').style.display = 'block';
            document.getElementById('lkUsername').innerText = profile.username;
            document.getElementById('userBalance').innerText = profile.balance || 0;
            if(profile.skin_url) document.getElementById('skinImg').src = profile.skin_url;
        }

        document.getElementById('logoutBtn').addEventListener('click', () => { window.location.reload(); });
    </script>
</body>
</html>
