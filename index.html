    <style>
        :root { 
            --primary-color: #4fc3f7; 
            --accent-color: #2ecc71; 
            --dark-bg: rgba(15, 15, 15, 0.95); 
        }
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://alphacoders.com') no-repeat center center fixed; 
            background-size: cover; color: #fff; 
        }
        
        /* Шапка в стиле GribLand */
        nav { 
            background: #0a0a0a; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; 
        }
        nav .brand { 
            font-size: 1.8rem; font-weight: bold; color: var(--primary-color); text-decoration: none; text-shadow: 2px 2px 0 #000; 
        }
        nav .menu-links a { 
            color: #bbb; text-decoration: none; margin-left: 25px; font-weight: 500; transition: 0.3s; 
        }
        nav .menu-links a:hover { color: var(--primary-color); }

        /* Контейнер страниц */
        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid-panel { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 900px) { .grid-panel { grid-template-columns: 1fr; } }
        
        .card { background: var(--dark-bg); border: 1px solid #333; border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .card h3 { margin-top: 0; color: var(--primary-color); border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        /* Формы и Поля ввода */
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 6px; background: #050505; color: #fff; box-sizing: border-box; }
        .input-field:focus { border-color: var(--primary-color); outline: none; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .btn-green { background: var(--accent-color); color: #fff; } .btn-green:hover { background: #27ae60; }
        .btn-blue { background: var(--primary-color); color: #000; } .btn-blue:hover { background: #29b6f6; }
        
        /* Отображение Скина */
        .skin-preview { background: #050505; border: 2px dashed #333; height: 300px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; }
        .skin-image { height: 90%; image-rendering: pixelated; }
        .balance-badge { background: #f39c12; color: #000; padding: 6px 18px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        
        .hidden { display: none; } 
        .status-msg { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- Навигация сайта -->
    <nav>
        <a href="#" class="brand">🌊 WATERPROJECT</a>
        <div class="menu-links">
            <span id="navUser" style="color: #bbb; font-weight: 500;"><i class="fa-solid fa-user"></i> Гость</span>
        </div>
    </nav>

    <div class="main-container">
        
        <!-- БЛОК 1: Авторизация и Регистрация (для гостей) -->
        <div id="authBlock" class="card" style="max-width: 400px; margin: 40px auto;">
            <h3>Личный Кабинет</h3>
            <p style="color: #888; font-size: 0.9rem;">Введите никнейм и пароль для входа или регистрации.</p>
            <form onsubmit="return false;">
                <input type="text" id="username" class="input-field" placeholder="Ваш игровой никнейм" required maxlength="16">
                <input type="password" id="password" class="input-field" placeholder="Ваш пароль" required>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="button" id="loginBtn" class="btn btn-blue">Войти</button>
                    <button type="button" id="regBtn" class="btn btn-green">Регистрация</button>
                </div>
            </form>
            <div id="authMessage" class="status-msg"></div>
        </div>

        <!-- БЛОК 2: Личный Кабинет Игрока (скрыт до авторизации) -->
        <div id="lkBlock" class="grid-panel hidden">
            
            <!-- Левая колонка: Профиль и Скин -->
            <div class="card" style="text-align: center;">
                <h3>Ваш Персонаж</h3>
                <div class="balance-badge"><i class="fa-solid fa-coins"></i> Баланс: <span id="userBalance">0</span> монет</div>
                <div class="skin-preview">

                <p id="lkUsername" style="font-size: 1.3rem; font-weight: bold; margin: 0; color: var(--primary-color);"></p>

            <div class="card">

                    <label style="font-weight: bold; display: block; margin-bottom: 8px;"><i class="fa-solid fa-shirt"></i> Установка скина (.PNG)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="file" id="skinFile" accept=".png" class="input-field" style="margin:0; padding: 8px;">
                        <button type="button" id="uploadSkinBtn" class="btn btn-blue" style="width: auto; padding: 0 20px;">Загрузить</button>
                    </div>
                </div>

                <!-- Плащ -->
                <div style="margin-bottom: 25px;">
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;"><i class="fa-solid fa-cloak"></i> Установка плаща (.PNG)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="file" id="capeFile" accept=".png" class="input-field" style="margin:0; padding: 8px;">
                        <button type="button" id="uploadCapeBtn" class="btn btn-blue" style="width: auto; padding: 0 20px;">Загрузить</button>
                    </div>

                <div>

                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="promoInput" class="input-field" placeholder="Введите рабочий промокод" style="margin: 0;">
                        <button type="button" id="activatePromoBtn" class="btn btn-green" style="width: auto; padding: 0 25px;">ОК</button>
                    </div>
                </div>
                
                <div id="lkMessage" class="status-msg"></div>
            </div>

        </div>

    </div>

    <!-- ЛОГИКА ВЕБ-СЕРВЕРА (JAVASCRIPT) -->
    <script>
        // ЗАМЕНИТЕ ЭТИ СТРОКИ НА ВАШИ ДАННЫЕ ИЗ SUPABASE («дата апл» и «ключи апл»)
        const SUPABASE_URL = "https://hqedflvozrymweaueymk.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_AhbI07QUWbsjEy-16VJ4zw_ymUbQ7sL";
        
        // Исправленная инициализация через глобальный объект window
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = null;

        // ФУНКЦИЯ ВХОДА В АККАУНТ
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');
            if(!user || !pass) return;
            
            msg.innerText = "Авторизация...";
            msg.style.color = "#fff";
            
            try {
                const { data, error } = await supabase.from('users').select('*').eq('username', user).single();
                if (error || !data || data.password_hash !== pass) { 
                    msg.innerText = "Неверный никнейм или пароль!"; 
                    msg.style.color = "#e74c3c"; 
                } else { 
                    currentUser = data; 
                    openDashboard(); 
                }
            } catch(err) { 
                msg.innerText = "Ошибка соединения с базой."; 
                msg.style.color = "#e74c3c";
            }
        });

        // ФУНКЦИЯ РЕГИСТРАЦИИ АККАУНТА
        document.getElementById('regBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('authMessage');

            if(user.length < 3 || user.length > 16) { 
                msg.innerText = "Ник должен быть от 3 до 16 символов!"; 
                msg.style.color = "#e74c3c"; 
                return; 
            }
            if(!pass) return;
            
            msg.innerText = "Создание аккаунта...";
            msg.style.color = "#fff";
            
            try {
const { data, error } = await supabase.from('users').insert([{ username: user, password_hash: pass }]).select().single();if (error) {msg.innerText = "Этот никнейм уже занят!";msg.style.color = "#e74c3c";} else {currentUser = data;openDashboard();}} catch(err) {msg.innerText = "Ошибка регистрации.";msg.style.color = "#e74c3c";}});// ОТКРЫТИЕ ПАНЕЛИ ИГРОКАfunction openDashboard() {document.getElementById('authBlock').classList.add('hidden');document.getElementById('lkBlock').classList.remove('hidden');document.getElementById('navUser').innerHTML = <i class="fa-solid fa-circle-user"></i> Привет, ${currentUser.username};document.getElementById('lkUsername').innerText = currentUser.username;document.getElementById('userBalance').innerText = currentUser.balance;if(currentUser.skin_url) {document.getElementById('skinImg').src = currentUser.skin_url;}}// ЗАГРУЗКА И СМЕНА СКИНАdocument.getElementById('uploadSkinBtn').addEventListener('click', async () => {const fileInput = document.getElementById('skinFile');const msg = document.getElementById('lkMessage');if (!fileInput.files.length) return;msg.innerText = "Загрузка скина..."; msg.style.color = "#fff";const file = fileInput.files[0];const fileName = ${currentUser.username}_skin.png;try {const { error: uploadError } = await supabase.storage.from('skins').upload(fileName, file, { cacheControl: '0', upsert: true });if (!uploadError) {const { data } = supabase.storage.from('skins').getPublicUrl(fileName);await supabase.from('users').update({ skin_url: data.publicUrl }).eq('id', currentUser.id);document.getElementById('skinImg').src = data.publicUrl + "?t=" + new Date().getTime();msg.innerText = "Скин успешно обновлен!"; msg.style.color = "#2ecc71";} else {msg.innerText = "Ошибка Bucket: " + uploadError.message; msg.style.color = "#e74c3c";}} catch(e) { msg.innerText = "Сбой файлового потока."; msg.style.color = "#e74c3c"; }});// АКТИВАЦИЯ ПРОМОКОДАdocument.getElementById('activatePromoBtn').addEventListener('click', async () => {const codeInput = document.getElementById('promoInput').value.trim();const msg = document.getElementById('lkMessage');if(!codeInput) return;msg.innerText = "Проверка кода..."; msg.style.color = "#fff";try {const { data: promo, error } = await supabase.from('promocodes').select('*').eq('code', codeInput).single();if (error || !promo || promo.uses_left <= 0) {msg.innerText = "Промокод не существует или закончился!"; msg.style.color = "#e74c3c";return;}const { data: checkAct } = await supabase.from('promocode_activations').select('*').eq('user_id', currentUser.id).eq('promocode_id', promo.id).single();if(checkAct) {msg.innerText = "Вы уже вводили этот промокод!"; msg.style.color = "#f39c12";return;}const newBalance = currentUser.balance + promo.reward_money;await supabase.from('users').update({ balance: newBalance }).eq('id', currentUser.id);await supabase.from('promocode_activations').insert([{ user_id: currentUser.id, promocode_id: promo.id }]);await supabase.from('promocodes').update({ uses_left: promo.uses_left - 1 }).eq('id', promo.id);currentUser.balance = newBalance;document.getElementById('userBalance').innerText = newBalance;msg.innerText = Успешно! Начислено +${promo.reward_money} монет.; msg.style.color = "#2ecc71";document.getElementById('promoInput').value = "";} catch(e) { msg.innerText = "Ошибка обработки кода."; msg.style.color = "#e74c3c"; }});
